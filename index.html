<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступная Интерактивная Галерея</title>
    <style>
        #image {
            width: 85%;
            height: 300px;
            border: 5px solid #333;
            margin: 20px auto;
            background-color: #8e8e8e;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            text-align: center;
            line-height: 300px;
            font-size: 150%;
            color: #ffffff;
            font-weight: bold;
        }
        .preview {
            width: 150px;
            height: 100px;
            border: 3px solid #ccc;
            margin: 10px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        /* Стилизация фокуса для клавиатуры, чтобы было видно, где находится курсор */
        .preview:focus, .preview:hover {
            border-color: #1a365d;
            outline: 2px solid #2b6cb0;
        }
        .gallery-container {
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="image">
        Наведите курсор на изображение ниже или используйте Tab
    </div>

    <div class="gallery-container">
        <!-- 6 изображений с уникальными alt и полным набором событий мыши и фокуса -->
        <img class="preview" src="https://picsum.photos/600/400?random=1" alt="Осенний лес в горах" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://picsum.photos/600/400?random=2" alt="Океанский закат" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://picsum.photos/600/400?random=3" alt="Городские огни ночью" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://picsum.photos/600/400?random=4" alt="Заснеженные вершины" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://picsum.photos/600/400?random=5" alt="Зеленый тропический лист" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://picsum.photos/600/400?random=6" alt="Пустынные дюны" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
    </div>

    <script src="script.js"></script>
</body>
</html>
