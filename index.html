<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная галерея</title>
    <style>
        /* Базовые стили, чтобы галерея выглядела аккуратно */
        #image {
            width: 85%;
            height: 300px;
            border: 5px solid #333;
            margin: 20px auto;
            background-color: #8e8e8e;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            text-align: center;
            line-height: 300px;
            font-size: 150%;
            color: #ffffff;
            font-weight: bold;
        }
        .preview {
            width: 150px;
            height: 100px;
            border: 3px solid #ccc;
            margin: 10px;
            cursor: pointer;
        }
        .preview:hover {
            border-color: #333;
        }
    </style>
</head>
<body>

    <div id="image">
        Наведите курсор на изображение ниже, чтобы отобразить его здесь
    </div>

    <div style="text-align: center;">
        <img class="preview" 
             src="https://picsum.photos/600/400?random=1" 
             alt="Осенний лес в горах" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             src="https://picsum.photos/600/400?random=2" 
             alt="Океанский закат" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             src="https://picsum.photos/600/400?random=3" 
             alt="Городские огни ночью" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">
    </div>

    <!-- Подключаем скрипт, который создадим следующим шагом -->
    <script src="script.js"></script>
</body>
</html>
